<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가입 확인 - Marketing Plan & ESG 퀴즈</title>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f6fb;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: #1a1a1a;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #ffffff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 8px 24px rgba(11, 61, 140, 0.12);
    text-align: center;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 8px;
    color: #0b3d8c;
  }
  p {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="card">
    <h1 id="title">가입 확인 완료</h1>
    <p id="lead">이메일 인증이 완료되었습니다. 원래 사용하시던 화면으로 돌아가 아이디와 비밀번호로 로그인해주세요.</p>
  </div>

  <script>
    (function () {
      // 가입 확인 메일 링크는 Supabase가 인증을 처리한 뒤 이 페이지로 리다이렉트한다.
      // 즉 이 페이지가 열렸다는 사실 자체가 인증 완료를 의미하므로, 별도로 로그인을
      // 대신 처리(자동 로그인)하지 않고 안내 메시지만 보여준다. 로그인은 사용자가
      // 원래 열어 두었던 화면에서 직접 아이디/비밀번호로 진행한다.
      var hash = window.location.hash || "";
      var params = {};
      hash.replace(/^#/, "").split("&").forEach(function (pair) {
        if (!pair) return;
        var kv = pair.split("=");
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || "");
      });

      // 휴대폰에 앱이 설치되어 있으면 커스텀 스킴으로 앱을 열어본다(앱은 토큰을 받아
      // 자동으로 로그인까지 이어간다 - app/auth.js의 __atomyQuizApplySignupConfirm 참고).
      // 앱이 없으면(PC 등) 이 시도는 조용히 무시되고 위 안내 메시지만 남는다.
      if (params.access_token && params.refresh_token) {
        window.location.href = "atomyquiz://signup-callback" + hash;
      } else {
        document.getElementById("title").textContent = "유효하지 않은 링크입니다";
        document.getElementById("lead").textContent = "링크가 만료되었거나 잘못되었습니다. 앱에서 가입을 다시 시도해주세요.";
      }
    })();
  </script>
</body>
</html>
