<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정 - Marketing Plan & ESG 퀴즈</title>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f6fb;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: #1a1a1a;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #ffffff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 8px 24px rgba(11, 61, 140, 0.12);
    text-align: center;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 8px;
    color: #0b3d8c;
  }
  p {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
    margin: 0 0 16px;
  }
  label {
    display: block;
    text-align: left;
    font-size: 13px;
    color: #333;
    margin-bottom: 6px;
    font-weight: 600;
  }
  input[type="password"] {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1px solid #d6ddf0;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 14px;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: #0b3d8c;
  }
  .btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 12px 20px;
    background: #0b3d8c;
    color: #fff;
    border: none;
    border-radius: 10px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .btn-secondary {
    background: none;
    color: #0b3d8c;
    font-weight: 500;
    font-size: 13px;
    margin-top: 14px;
  }
  .status {
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .status.error { color: #b3261e; }
  .status.ok { color: #1a7a3c; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="card">
    <h1 id="title">새 비밀번호 설정</h1>
    <p id="lead">아래에 새 비밀번호를 입력해주세요.</p>

    <form id="reset-form">
      <label for="pw1">새 비밀번호 (6자 이상)</label>
      <input type="password" id="pw1" autocomplete="new-password" minlength="6" required>
      <label for="pw2">새 비밀번호 확인</label>
      <input type="password" id="pw2" autocomplete="new-password" minlength="6" required>
      <button type="submit" class="btn" id="submit-btn">비밀번호 변경</button>
    </form>

    <button type="button" class="btn btn-secondary" id="open-app-btn">대신 휴대폰 앱에서 열기</button>

    <div class="status" id="status"></div>
  </div>

  <script src="vendor/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    (function () {
      var hash = window.location.hash || "";
      var deepLink = "atomyquiz://reset-callback" + hash;
      var params = {};
      hash.replace(/^#/, "").split("&").forEach(function (pair) {
        if (!pair) return;
        var kv = pair.split("=");
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || "");
      });

      var elForm = document.getElementById("reset-form");
      var elPw1 = document.getElementById("pw1");
      var elPw2 = document.getElementById("pw2");
      var elSubmitBtn = document.getElementById("submit-btn");
      var elStatus = document.getElementById("status");
      var elTitle = document.getElementById("title");
      var elLead = document.getElementById("lead");
      var elOpenAppBtn = document.getElementById("open-app-btn");

      elOpenAppBtn.addEventListener("click", function () {
        window.location.href = deepLink;
      });

      function setStatus(text, kind) {
        elStatus.textContent = text || "";
        elStatus.className = "status" + (kind ? " " + kind : "");
      }

      function fail(message) {
        elForm.classList.add("hidden");
        elOpenAppBtn.classList.add("hidden");
        elTitle.textContent = "유효하지 않은 링크입니다";
        elLead.textContent = message;
      }

      if (!params.access_token || !params.refresh_token) {
        fail("링크가 만료되었거나 잘못되었습니다. 앱에서 비밀번호 재설정을 다시 요청해주세요.");
        return;
      }

      if (typeof window.supabase === "undefined" || typeof window.supabase.createClient !== "function") {
        fail("페이지를 불러오는 중 문제가 발생했습니다. 새로고침 후 다시 시도해주세요.");
        return;
      }

      var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      setStatus("링크를 확인하는 중입니다...");
      client.auth.setSession({ access_token: params.access_token, refresh_token: params.refresh_token }).then(function (res) {
        if (res.error) {
          fail("링크가 만료되었거나 이미 사용되었습니다. 앱에서 비밀번호 재설정을 다시 요청해주세요.");
          return;
        }
        setStatus("");
      });

      elForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var pw1 = elPw1.value;
        var pw2 = elPw2.value;
        if (!pw1 || pw1.length < 6) {
          setStatus("새 비밀번호는 6자 이상이어야 합니다.", "error");
          return;
        }
        if (pw1 !== pw2) {
          setStatus("두 비밀번호가 서로 다릅니다.", "error");
          return;
        }
        elSubmitBtn.disabled = true;
        setStatus("비밀번호를 변경하는 중입니다...");
        client.auth.updateUser({ password: pw1 }).then(function (res) {
          elSubmitBtn.disabled = false;
          if (res.error) {
            setStatus(res.error.message || "비밀번호 변경에 실패했습니다.", "error");
            return;
          }
          elForm.classList.add("hidden");
          elOpenAppBtn.classList.add("hidden");
          elTitle.textContent = "변경 완료";
          elLead.textContent = "비밀번호가 변경되었습니다. 이제 앱이나 웹에서 새 비밀번호로 로그인해주세요.";
          setStatus("");
        });
      });
    })();
  </script>
</body>
</html>
